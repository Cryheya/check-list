<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Чек-лист магазина IRG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2330;
    --border: #2a2f3e;
    --accent: #3b7dd8;
    --accent2: #5a9bf5;
    --text: #e8eaf0;
    --text2: #8b93a8;
    --text3: #555e75;
    --yes: #22c55e; --yes-bg: rgba(34,197,94,.12); --yes-border: rgba(34,197,94,.3);
    --no:  #ef4444; --no-bg:  rgba(239,68,68,.12);  --no-border:  rgba(239,68,68,.3);
    --np:  #94a3b8; --np-bg:  rgba(148,163,184,.1); --np-border:  rgba(148,163,184,.25);
    --child-bg: #161a24;
    --section-gradient: linear-gradient(135deg, #1d3461 0%, #1a2a4a 100%);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 15px; }
  body { font-family: 'Golos Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 20px; height: 20px; fill: white; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 1rem; font-weight: 700; line-height: 1.2; }
  .header-title span { font-size: .75rem; color: var(--text2); }

  /* Score bar */
  .score-bar { padding: 10px 0 14px; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .score-label { font-size: .8rem; color: var(--text2); white-space: nowrap; }
  .score-numbers { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .score-pct { margin-left: auto; font-size: 1.4rem; font-weight: 700; color: var(--accent2); }
  .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s cubic-bezier(.4,0,.2,1); width: 0%; }

  /* Meta inputs */
  .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 0 12px; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-field label { font-size: .7rem; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
  .meta-field input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: .85rem; padding: 7px 10px; outline: none; width: 100%; }
  .meta-field input:focus { border-color: var(--accent); }
  .meta-wide { grid-column: 1/-1; }

  /* ── MAIN ── */
  main { padding: 12px 12px 80px; max-width: 720px; margin: 0 auto; }

  /* Section */
  .section { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--border); }
  .section-header { background: var(--section-gradient); padding: 13px 16px;
    display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
    border-bottom: 1px solid rgba(255,255,255,.06); }
  .section-header:active { opacity: .85; }
  .section-num { font-size: .65rem; font-weight: 700; background: rgba(255,255,255,.15);
    border-radius: 4px; padding: 2px 6px; color: rgba(255,255,255,.8); letter-spacing: .05em; }
  .section-name { flex: 1; font-size: .9rem; font-weight: 600; }
  .section-badge { display: flex; align-items: center; gap: 6px; }
  .badge-score { font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); }
  .section-chevron { color: rgba(255,255,255,.5); transition: transform .25s; font-size: 1rem; }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .subsection-header { background: rgba(59,125,216,.08); padding: 8px 16px;
    font-size: .75rem; font-weight: 600; color: var(--accent2); letter-spacing: .04em;
    text-transform: uppercase; border-bottom: 1px solid var(--border); }

  /* Item row */
  .item { border-bottom: 1px solid var(--border); }
  .item:last-child { border-bottom: none; }
  .item-row { display: flex; align-items: flex-start; gap: 0; padding: 0; }
  .item-main { flex: 1; padding: 11px 14px 11px 14px; cursor: pointer; }
  .item-num { font-size: .68rem; color: var(--text3); margin-bottom: 2px; font-weight: 500; }
  .item-text { font-size: .85rem; line-height: 1.45; color: var(--text); }
  .item-text.has-children { cursor: pointer; }

  /* Vote buttons */
  .vote-btns { display: flex; flex-direction: column; gap: 1px; padding: 6px 10px 6px 0; justify-content: center; flex-shrink: 0; }
  .vbtn { border: none; border-radius: 5px; font-family: inherit; font-size: .72rem; font-weight: 600;
    padding: 5px 9px; cursor: pointer; transition: all .15s; white-space: nowrap;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .vbtn:active { transform: scale(.94); }
  .vbtn.yes.active { background: var(--yes-bg); color: var(--yes); border-color: var(--yes-border); }
  .vbtn.no.active  { background: var(--no-bg);  color: var(--no);  border-color: var(--no-border); }
  .vbtn.np.active  { background: var(--np-bg);  color: var(--np);  border-color: var(--np-border); }

  /* Auto-computed parent */
  .auto-badge { font-size: .72rem; font-weight: 600; padding: 4px 10px; border-radius: 5px;
    border: 1px solid; white-space: nowrap; }
  .auto-badge.yes  { background: var(--yes-bg); color: var(--yes); border-color: var(--yes-border); }
  .auto-badge.no   { background: var(--no-bg);  color: var(--no);  border-color: var(--no-border); }
  .auto-badge.empty { background: var(--surface2); color: var(--text3); border-color: var(--border); }
  .auto-wrap { padding: 6px 10px 6px 0; display: flex; align-items: center; flex-shrink: 0; }

  /* Children toggle */
  .children-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 14px 2px;
    cursor: pointer; color: var(--text3); font-size: .78rem; }
  .children-toggle .ct-icon { font-size: .7rem; transition: transform .2s; }
  .children-toggle.open .ct-icon { transform: rotate(90deg); }
  .children-list { padding: 0 0 4px 0; }
  .children-list.hidden { display: none; }

  /* Child item */
  .child-item { display: flex; align-items: flex-start; background: var(--child-bg);
    border-top: 1px solid rgba(255,255,255,.04); }
  .child-indicator { width: 3px; background: rgba(59,125,216,.3); flex-shrink: 0; align-self: stretch; margin-left: 14px; border-radius: 2px; margin: 6px 0 6px 14px; }
  .child-content { flex: 1; padding: 9px 0 9px 10px; }
  .child-num { font-size: .65rem; color: var(--text3); margin-bottom: 1px; }
  .child-text { font-size: .82rem; line-height: 1.4; color: #a0a8bc; }
  .child-vote { display: flex; flex-direction: column; gap: 1px; padding: 6px 10px 6px 6px; justify-content: center; flex-shrink: 0; }
  .cvbtn { border: none; border-radius: 4px; font-family: inherit; font-size: .68rem; font-weight: 600;
    padding: 4px 8px; cursor: pointer; transition: all .15s;
    background: rgba(255,255,255,.04); color: var(--text3); border: 1px solid var(--border); }
  .cvbtn:active { transform: scale(.92); }
  .cvbtn.yes.active { background: var(--yes-bg); color: var(--yes); border-color: var(--yes-border); }
  .cvbtn.no.active  { background: var(--no-bg);  color: var(--no);  border-color: var(--no-border); }

  /* Comment */
  .comment-wrap { padding: 0 14px 10px; }
  .comment-input { width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: .82rem;
    padding: 8px 10px; outline: none; resize: none; min-height: 56px; line-height: 1.4; }
  .comment-input:focus { border-color: var(--accent); }
  .comment-toggle { font-size: .75rem; color: var(--text3); padding: 0 14px 8px; cursor: pointer; }
  .comment-toggle:hover { color: var(--accent2); }

  /* FAB */
  .fab { position: fixed; bottom: 20px; right: 16px; z-index: 200;
    background: var(--accent); color: white; border: none; border-radius: 14px;
    padding: 13px 20px; font-family: inherit; font-size: .85rem; font-weight: 600;
    cursor: pointer; box-shadow: 0 6px 24px rgba(59,125,216,.4);
    display: flex; align-items: center; gap: 8px; transition: transform .15s; }
  .fab:active { transform: scale(.95); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px 32px;
    width: 100%; max-width: 600px; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .modal-section { margin-bottom: 10px; }
  .modal-sec-title { font-size: .8rem; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
  .modal-row { display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .modal-row:last-child { border: none; }
  .modal-row-score { font-weight: 600; }
  .modal-row-score.good { color: var(--yes); }
  .modal-row-score.bad { color: var(--no); }
  .modal-total { background: var(--surface2); border-radius: var(--radius); padding: 14px;
    display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .modal-total-label { font-weight: 600; }
  .modal-total-score { font-size: 1.3rem; font-weight: 700; color: var(--accent2); }
  .modal-close { width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: .9rem; padding: 13px;
    border-radius: var(--radius); cursor: pointer; margin-top: 14px; font-weight: 500; }

  @media (min-width: 600px) {
    .meta { grid-template-columns: 1fr 1fr 1fr; }
    .meta-wide { grid-column: auto; }
  }
</style>
</head>

<div class="header">
  <div class="header-top">
    <div class="logo">

</div>

<main id="main-content"></main>

<button class="fab" onclick="openSummary()">

</button>

<div class="modal-overlay" id="modal-overlay" onclick="closeIfOutside(event)">

    <div id="modal-body"></div>
    <button class="modal-close" onclick="closeSummary()">Закрыть</button>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────
const state = {}; // itemId -> {val: 'yes'|'no'|'np'|null, comment: '', children: {childId -> 'yes'|'no'|null}}

function getItemId(secIdx, itemIdx) { return `${secIdx}_${itemIdx}`; }

function initState() {
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const id = getItemId(si, ii);
      state[id] = { val: null, comment: '', children: {} };
      item.children.forEach(ch => { state[id].children[ch.num] = null; });
    });
  });
}

// ── Score logic ───────────────────────────────────────────────────────────
function getItemScore(id, item) {
  const s = state[id];
  if (item.children.length > 0) {
    const vals = item.children.map(ch => s.children[ch.num]);
    if (vals.some(v => v === 'no')) return 'no';
    if (vals.every(v => v === 'yes')) return 'yes';
    return null;
  }
  return s.val;
}

function calcScores() {
  let done = 0, total = 0;
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const id = getItemId(si, ii);
      const score = getItemScore(id, item);
      if (score === 'yes') done++;
      if (score !== null) total++;
    });
  });
  return { done, total, all: countItems() };
}

function countItems() {
  return SECTIONS.reduce((acc, sec) => acc + sec.items.length, 0);
}

function updateScoreBar() {
  const all = countItems();
  const { done, total } = calcScores();
  const pct = all > 0 ? Math.round(done / all * 100) : 0;
  document.getElementById('score-done').textContent = done;
  document.getElementById('score-total').textContent = all;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  SECTIONS.forEach((sec, si) => {
    const secDone = sec.items.filter((item, ii) => getItemScore(getItemId(si, ii), item) === 'yes').length;
    const secTotal = sec.items.length;

    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.id = `sec-${si}`;

    // Section header
    const [secNum, ...secRest] = sec.title.split('. ');
    secEl.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <span class="section-num">${secNum}</span>
        <span class="section-name">${secRest.join('. ')}</span>
        <span class="badge-score">${secDone}/${secTotal}</span>
        <span class="section-chevron">›</span>
      </div>
      <div class="section-body" id="secbody-${si}"></div>
    `;
    main.appendChild(secEl);

    const body = secEl.querySelector(`#secbody-${si}`);

    sec.items.forEach((item, ii) => {
      const id = getItemId(si, ii);
      const s = state[id];
      const hasChildren = item.children.length > 0;
      const autoScore = hasChildren ? getItemScore(id, item) : null;

      // Subsection header
      if (item.subsection) {
        const subEl = document.createElement('div');
        subEl.className = 'subsection-header';
        subEl.textContent = item.subsection;
        body.appendChild(subEl);
      }

      const itemEl = document.createElement('div');
      itemEl.className = 'item';
      itemEl.id = `item-${id}`;

      // Vote buttons or auto badge
      let voteHTML = '';
      if (hasChildren) {
        const cls = autoScore === 'yes' ? 'yes' : autoScore === 'no' ? 'no' : 'empty';
        const label = autoScore === 'yes' ? '✓ Да' : autoScore === 'no' ? '✗ Нет' : '—';
        voteHTML = `<div class="auto-wrap"><span class="auto-badge ${cls}">${label}</span></div>`;
      } else {
        const yA = s.val==='yes'?'active':'', nA = s.val==='no'?'active':'', npA = s.val==='np'?'active':'';
        voteHTML = `<div class="vote-btns">
          <button class="vbtn yes ${yA}" onclick="setVal('${id}',${si},'yes',event)">Да</button>
          <button class="vbtn no ${nA}" onclick="setVal('${id}',${si},'no',event)">Нет</button>
          <button class="vbtn np ${npA}" onclick="setVal('${id}',${si},'np',event)">НП</button>
        </div>`;
      }

      // Children
      let childrenHTML = '';
      if (hasChildren) {
        const childrenOpen = item.children.some(ch => s.children[ch.num] !== null);
        const ctOpen = childrenOpen ? 'open' : '';
        const listHidden = childrenOpen ? '' : 'hidden';
        const chRows = item.children.map(ch => {
          const cv = s.children[ch.num];
          const yA = cv==='yes'?'active':'', nA = cv==='no'?'active':'';
          return `<div class="child-item">
            <div class="child-indicator"></div>
            <div class="child-content">
              <div class="child-num">${ch.num}</div>
              <div class="child-text">${ch.text}</div>
            </div>
            <div class="child-vote">
              <button class="cvbtn yes ${yA}" onclick="setChild('${id}',${si},'${ch.num}','yes',event)">Да</button>
              <button class="cvbtn no ${nA}" onclick="setChild('${id}',${si},'${ch.num}','no',event)">Нет</button>
            </div>
          </div>`;
        }).join('');

        childrenHTML = `
          <div class="children-toggle ${ctOpen}" id="ct-${id}" onclick="toggleChildren('${id}')">
            <span class="ct-icon">›</span>
            <span>${item.children.length} пунктов для проверки</span>
          </div>
          <div class="children-list ${listHidden}" id="cl-${id}">${chRows}</div>`;
      }

      // Comment
      const hasComment = s.comment.length > 0;
      const commentHTML = `
        <div class="comment-toggle" onclick="toggleComment('${id}')" id="cmtgl-${id}">${hasComment ? '▾ Комментарий' : '+ добавить комментарий'}</div>
        <div class="comment-wrap" id="cmwrap-${id}" style="${hasComment?'':'display:none'}">
          <textarea class="comment-input" placeholder="Комментарий к пункту…" 
            oninput="setComment('${id}',this.value)" id="cmt-${id}">${s.comment}</textarea>
        </div>`;

      itemEl.innerHTML = `
        <div class="item-row">
          <div class="item-main">
            <div class="item-num">${item.num}</div>
            <div class="item-text">${item.text}</div>
          </div>
          ${voteHTML}
        </div>
        ${childrenHTML}
        ${commentHTML}
      `;

      body.appendChild(itemEl);
    });
  });

  updateScoreBar();
}

// ── Interactions ──────────────────────────────────────────────────────────
function toggleSection(si) {
  document.getElementById(`sec-${si}`).classList.toggle('collapsed');
}

function setVal(id, si, val, e) {
  e.stopPropagation();
  state[id].val = state[id].val === val ? null : val;
  rerenderItem(id, si);
  updateScoreBar();
  updateSectionBadge(si);
}

function setChild(id, si, childNum, val, e) {
  e.stopPropagation();
  state[id].children[childNum] = state[id].children[childNum] === val ? null : val;
  rerenderItem(id, si);
  updateScoreBar();
  updateSectionBadge(si);
}

function setComment(id, val) {
  state[id].comment = val;
}

function toggleComment(id) {
  const wrap = document.getElementById(`cmwrap-${id}`);
  const tgl = document.getElementById(`cmtgl-${id}`);
  const visible = wrap.style.display !== 'none';
  wrap.style.display = visible ? 'none' : 'block';
  if (!visible) tgl.textContent = '▾ Комментарий';
}

function toggleChildren(id) {
  const list = document.getElementById(`cl-${id}`);
  const toggle = document.getElementById(`ct-${id}`);
  list.classList.toggle('hidden');
  toggle.classList.toggle('open');
}

function rerenderItem(id, si) {
  // Find item index
  const [siStr, iiStr] = id.split('_');
  const item = SECTIONS[parseInt(siStr)].items[parseInt(iiStr)];
  const s = state[id];
  const hasChildren = item.children.length > 0;
  const autoScore = hasChildren ? getItemScore(id, item) : null;

  if (hasChildren) {
    // Update auto badge
    const wrap = document.querySelector(`#item-${id} .auto-wrap`);
    if (wrap) {
      const cls = autoScore === 'yes' ? 'yes' : autoScore === 'no' ? 'no' : 'empty';
      const label = autoScore === 'yes' ? '✓ Да' : autoScore === 'no' ? '✗ Нет' : '—';
      wrap.innerHTML = `<span class="auto-badge ${cls}">${label}</span>`;
    }
    // Update child buttons
    item.children.forEach(ch => {
      const cv = s.children[ch.num];
      const btns = document.querySelectorAll(`#item-${id} .cvbtn`);
      btns.forEach(btn => {
        if (btn.textContent === 'Да' && btn.closest('.child-item')) {
          // find correct child
        }
      });
      // Re-render child buttons by finding them
      const childItems = document.querySelectorAll(`#cl-${id} .child-item`);
      childItems.forEach(ci => {
        const numEl = ci.querySelector('.child-num');
        if (numEl && numEl.textContent === ch.num) {
          const cv2 = s.children[ch.num];
          ci.querySelectorAll('.cvbtn').forEach(b => {
            b.classList.remove('active');
            if ((b.textContent==='Да' && cv2==='yes') || (b.textContent==='Нет' && cv2==='no')) b.classList.add('active');
          });
        }
      });
    });
  } else {
    // Update vote buttons
    const btns = document.querySelectorAll(`#item-${id} .vbtn`);
    btns.forEach(btn => {
      btn.classList.remove('active');
      if ((btn.classList.contains('yes') && s.val==='yes') ||
          (btn.classList.contains('no')  && s.val==='no') ||
          (btn.classList.contains('np')  && s.val==='np')) btn.classList.add('active');
    });
  }
}

function updateSectionBadge(si) {
  const sec = SECTIONS[si];
  const done = sec.items.filter((item, ii) => getItemScore(getItemId(si, ii), item) === 'yes').length;
  const badge = document.querySelector(`#sec-${si} .badge-score`);
  if (badge) badge.textContent = `${done}/${sec.items.length}`;
}

// ── Summary modal ─────────────────────────────────────────────────────────
function openSummary() {
  const body = document.getElementById('modal-body');
  let html = '';

  SECTIONS.forEach((sec, si) => {
    const done = sec.items.filter((item, ii) => getItemScore(getItemId(si, ii), item) === 'yes').length;
    const total = sec.items.length;
    const pct = Math.round(done / total * 100);
    const cls = pct === 100 ? 'good' : pct < 50 ? 'bad' : '';
    html += `<div class="modal-row">
      <span>${sec.title}</span>
      <span class="modal-row-score ${cls}">${done}/${total} · ${pct}%</span>
    </div>`;
  });

  const all = countItems();
  const { done } = calcScores();
  const pct = Math.round(done / all * 100);

  html += `<div class="modal-total">
    <span class="modal-total-label">Общий результат</span>
    <span class="modal-total-score">${done}/${all} · ${pct}%</span>
  </div>`;

  // Issues list
  const issues = [];
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const id = getItemId(si, ii);
      const score = getItemScore(id, item);
      const comment = state[id].comment;
      if (score === 'no') issues.push(`${item.num} — ${item.text.substring(0,60)}…`);
    });
  });

  if (issues.length > 0) {
    html += `<div style="margin-top:14px">
      <div class="modal-sec-title" style="color:var(--no)">⚠ Нарушения (${issues.length})</div>
      ${issues.map(i => `<div class="modal-row"><span style="font-size:.82rem;color:var(--text2)">${i}</span></div>`).join('')}
    </div>`;
  }

  body.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeSummary() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeIfOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSummary();
}

// ── Init ──────────────────────────────────────────────────────────────────
document.getElementById('meta-date').valueAsDate = new Date();
initState();
render();
// Collapse all sections by default except first
document.querySelectorAll('.section').forEach((el, i) => { if (i > 0) el.classList.add('collapsed'); });
</script>
</body>
</html>
